# Detection rules: AI-powered offensive tools and autonomous agents

rules:
  - id: AI-020
    name: AI-Assisted Pentest Tool Detected
    description: Command line references a known AI-assisted security testing framework
    severity: medium
    category: ai_attack_tooling
    match:
      commandline_contains:
        - pentestgpt
        - PentestGPT
        - hackergpt
        - HackerGPT
        - burpgpt
        - BurpGPT
    tags: [offensive, ai-assisted, pentest]

  - id: AI-021
    name: Autonomous AI Agent Framework
    description: Command line references an autonomous AI agent framework
    severity: medium
    category: ai_attack_tooling
    match:
      commandline_contains:
        - autogpt
        - AutoGPT
        - agentgpt
        - babyagi
        - crewai
        - gpt-engineer
    tags: [autonomous-agent, ai-framework]

  - id: AI-022
    name: AI Code Generation Tool
    description: Command line references an AI-assisted code generation tool
    severity: low
    category: ai_attack_tooling
    match:
      commandline_words:
        - aider
        - aider.exe
        - continue.dev
        - cursor-agent
    tags: [ai-codegen, development]

  - id: AI-023
    name: AI API Key in Command Line
    description: AI service credential appears in process command-line arguments
    severity: critical
    category: ai_attack_tooling
    match:
      commandline_contains:
        - sk-proj-
        - sk-ant-api
    tags: [credential-exposure, api-key]

  - id: AI-024
    name: AI Model Serving Framework
    description: Production AI model serving frameworks detected on endpoint
    severity: medium
    category: ai_attack_tooling
    match:
      commandline_contains:
        - "tritonserver"
        - "torchserve"
        - "tensorflow_model_server"
        - "mlflow"
    tags: [model-serving, ml-infrastructure]

  - id: AI-025
    name: AI Vendor API Reference
    description: Process command line contains a known AI vendor API endpoint
    severity: medium
    category: ai_attack_tooling
    match:
      commandline_contains:
        - api.openai.com
        - api.anthropic.com
        - api.mistral.ai
        - api.cohere.ai
        - generativelanguage.googleapis.com
    tags: [api-call, data-exfiltration, ai-vendor]
