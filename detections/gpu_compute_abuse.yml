# Detection rules: GPU and compute activity associated with AI/ML workloads

rules:
  - id: AI-016
    name: PyTorch Execution Detected
    description: Python process invoking PyTorch library, may indicate ML model training or inference
    severity: low
    category: gpu_compute
    match:
      commandline_contains:
        - "import torch"
        - "from torch"
        - torch.cuda
    tags: [ml, gpu, pytorch]

  - id: AI-017
    name: TensorFlow Execution Detected
    description: Python process invoking TensorFlow library
    severity: low
    category: gpu_compute
    match:
      commandline_contains:
        - "import tensorflow"
        - "from tensorflow"
    tags: [ml, gpu, tensorflow]

  - id: AI-018
    name: NVIDIA GPU Tool Usage
    description: NVIDIA compiler or monitoring tool executed on the endpoint
    severity: low
    category: gpu_compute
    match:
      image_name:
        - nvcc.exe
        - nvidia-smi.exe
    tags: [gpu, cuda, compute]

  - id: AI-019
    name: nvidia-smi GPU Monitoring
    description: nvidia-smi used to query GPU status, common in ML pipeline scripts
    severity: low
    category: gpu_compute
    match:
      commandline_contains:
        - nvidia-smi
    tags: [gpu, discovery, nvidia]
